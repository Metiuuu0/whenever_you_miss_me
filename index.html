<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Whenever You Miss Me ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div id="login-container" class="container">

    <h1>❤️ Welcome Love ❤️</h1>

    <p>
        This little corner of the internet is just for you :D
    </p>

    <input id="email" type="email" placeholder="Email po">

    <input id="password" type="password" placeholder="Password po">

    <button onclick="login()">
        Enter ❤️
    </button>

    <p id="login-error"></p>

</div>
    
<div id="app" class="container hidden">

    <img src= "193A4604-B79B-4AE2-9956-065A6DF7FA37.png" alt="Us together" class="photo">

    <h1>❤️ Whenever You Miss Me ❤️</h1>

    <p class="subtitle">
        Hi love.<br><br>

        Whenever you need me,<br>
        I'm only one click away :D
    </p>

    <div class="buttons">

        <button onclick="playAudio('miss_you')">
            💙 I Miss You
        </button>

        <button onclick="playAudio('good_morning')">
            🌅 Good Morning
        </button>

        <button onclick="playAudio('good_night')">
            🌙 Good Night
        </button>

        <button onclick="playAudio('anxious')">
            😨 Anxious
        </button>

        <button onclick="playAudio('proud_of_you')">
            🌟 I'm Proud of You
        </button>
                <button onclick="playAudio('lots_of_kisses')">
            💋 Lots of kisses
        </button>


    </div>

</div>


<div id="player-container" class="hidden">
    <audio id="player" controls></audio>
</div>    
</div>
    <script src="script.js"></script>
</body>
</html>
