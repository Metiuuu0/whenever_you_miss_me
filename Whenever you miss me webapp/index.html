<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Whenever You Miss Me ❤️</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <img src="images/us.jpg" alt="Us together" class="photo">

    <h1>❤️ Whenever You Miss Me ❤️</h1>

    <p class="subtitle">
        Hi love.<br><br>

        Whenever you need me,<br>
        I'm only one click away.
    </p>

    <div class="buttons">

        <button onclick="playAudio('miss_you')">
            💙 I Miss You
        </button>

        <button onclick="playAudio('good_morning')">
            🌅 Good Morning
        </button>

        <button onclick="playAudio('good_night')">
            🌙 Good Night
        </button>

        <button onclick="playAudio('hug')">
            🤗 Hug
        </button>

        <button onclick="playAudio('proud_of_you')">
            🌟 I'm Proud of You
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
